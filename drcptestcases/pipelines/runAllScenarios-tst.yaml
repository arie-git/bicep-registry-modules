# Run all TST scenarios in two parallel lanes (manually triggered)
# Lane A: ENV23978 (S1→S2→S3→S4→S5→S7)
# Lane B: ENV23979 (S8→S10→S11→S12→S13→S14→S15)
# Within each lane: deploy → remove → next scenario (sequential).
# The two lanes run in parallel on separate environments.
# If a scenario fails, subsequent scenarios still run (condition: not(canceled())).
name: $(BuildDefinitionName)_AllScenarios_TST_$(Date:yyyyMMdd)$(Rev:.r)_$(Build.BuildId)

trigger: none
pr: none

parameters:
- name: skipWhatif
  displayName: 'Skip What-If validation?'
  type: boolean
  default: true

resources:
  repositories:
  - repository: templates
    type: git
    name: DRCP-Templates/templates
    ref: 'refs/heads/main'

pool: CPP-Ubuntu2204-Preview

extends:
  template: mandatory-template.yml@templates
  parameters:
    pipelineStages:
      # ════════════════════════════════════════════════
      # LANE A — ENV23978 (10.238.64.0/24)
      # ════════════════════════════════════════════════

      # ──────────────────────────────────────────────
      # S1 — ENV23978, /27
      # ──────────────────────────────────────────────
      - template: /modules/pipelines/tpl/universalPipeline_tpl.yaml@self
        parameters:
          stageNamePrefix: 'S1_'
          stageDisplayNamePrefix: '[S1] '
          isDeployment: true
          isRemoval: true
          askForRemovalApproval: false
          skipWhatif: ${{parameters.skipWhatif}}
          folderName: 'scenario1'
          fileNames:
            - main
          applicationInstanceCode: '0194'
          environmentType: 'tst'
          location: 'swedencentral'
          environmentSnowId: 'ENV23978'
          engineersGroupObjectId: 'c27ffdba-5abc-422c-b56d-45d5fb490f85'
          networkAddressSpace: '10.238.64.0/27'

