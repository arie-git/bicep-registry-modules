        parameters:
          stageNamePrefix: 'S1_'
          stageDisplayNamePrefix: '[S1] '
          isDeployment: true
          isRemoval: true
          askForRemovalApproval: false
          skipWhatif: ${{parameters.skipWhatif}}
          folderName: 'scenario1'
          fileNames:
            - main
          applicationInstanceCode: '0195'
          environmentType: 'dev'
          location: 'swedencentral'
          environmentSnowId: 'ENV23968'
          engineersGroupObjectId: 'b9646e8d-0859-4e85-a10f-b5475e093ebd'
          networkAddressSpace: '10.238.18.0/27'

