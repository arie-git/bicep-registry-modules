# Run all DEV scenarios in two parallel lanes (manually triggered)
# Lane A: ENV23968 (S1→S2→S3→S4→S5→S7→S9)
# Lane B: ENV23969 (S8→S10→S11→S12→S13→S14→S15→S16→S17)
# Within each lane: deploy → remove → next scenario (sequential).
# The two lanes run in parallel on separate environments.
# If a scenario fails, subsequent scenarios still run (condition: not(canceled())).
name: $(BuildDefinitionName)_AllScenarios_DEV_$(Date:yyyyMMdd)$(Rev:.r)_$(Build.BuildId)

trigger: none
pr: none

parameters:
- name: skipWhatif
  displayName: 'Skip What-If validation?'
  type: boolean
  default: true

resources:
  repositories:
  - repository: templates
    type: git
    name: DRCP-Templates/templates
    ref: 'refs/heads/main'

pool: CPP-Ubuntu2204-Preview

extends:
  template: mandatory-template.yml@templates
  parameters:
    pipelineStages:
      # ════════════════════════════════════════════════
      # LANE A -- ENV23968 (10.238.18.0/24)
      # ════════════════════════════════════════════════

      # ──────────────────────────────────────────────
      # S1 -- ENV23968, /27
      # ──────────────────────────────────────────────
